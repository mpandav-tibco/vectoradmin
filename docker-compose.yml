services:

  # ── Vector Admin UI ──────────────────────────────────────────────────────────
  ui:
    build: .
    container_name: vector-admin-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - vector-net

  # ── Weaviate ──────────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.25.4
    container_name: weaviate-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vector-net

  # ── Qdrant — optional: docker compose --profile qdrant up ───────────────────
  qdrant:
    profiles: [qdrant]
    image: qdrant/qdrant:v1.9.4
    container_name: qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - vector-net

  # ── Chroma — optional: docker compose --profile chroma up ────────────────────
  chroma:
    profiles: [chroma]
    image: chromadb/chroma:0.5.0
    container_name: chroma-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - vector-net

  # ── Ollama — optional, only starts with: docker compose --profile ollama up ────
  # Pull models on first start:
  #   docker exec ollama-dev ollama pull nomic-embed-text   # embeddings
  #   docker exec ollama-dev ollama pull llama3.2:3b        # chat/RAG
  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    container_name: ollama-dev
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - vector-net

  # ── pgvector / PostgREST — optional: docker compose --profile pgvector up ────
  # PostgREST exposes Postgres tables as a REST API that the pgvector adapter uses.
  # The init script creates the pgvector extension and a sample `documents` table.
  # After tables change, restart PostgREST: docker compose --profile pgvector restart postgrest
  postgres:
    profiles: [pgvector]
    image: pgvector/pgvector:pg16
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vector-net

  postgrest:
    profiles: [pgvector]
    image: postgrest/postgrest:v12.2.0
    container_name: postgrest-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/vectordb
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vector-net

networks:
  vector-net:
    driver: bridge

volumes:
  weaviate_data:
  qdrant_data:
  chroma_data:
  ollama_data:
  postgres_data:
