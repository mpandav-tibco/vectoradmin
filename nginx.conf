server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large batch payloads (vector uploads, document ingest)
    client_max_body_size 50m;

    # Gzip text responses — cuts JSON payload sizes by ~70%
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Basic security headers
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # Docker's internal DNS — resolve upstreams dynamically so nginx starts
    # even when optional containers (qdrant, chroma, pgvector, ollama) are not running.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── DB proxies ─────────────────────────────────────────────────────────────

    location /api/weaviate/ {
        set $weaviate http://weaviate:8080;
        rewrite ^/api/weaviate/(.*) /$1 break;
        proxy_pass $weaviate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/qdrant/ {
        set $qdrant http://qdrant:6333;
        rewrite ^/api/qdrant/(.*) /$1 break;
        proxy_pass $qdrant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/chroma/ {
        set $chroma http://chroma:8000;
        rewrite ^/api/chroma/(.*) /$1 break;
        proxy_pass $chroma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # PostgREST in front of pgvector (optional — start with --profile pgvector)
    location /api/pgvector/ {
        set $pgvector http://postgrest:3000;
        rewrite ^/api/pgvector/(.*) /$1 break;
        proxy_pass $pgvector;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Ollama — long timeout for large model inference
    location /api/ollama/ {
        set $ollama http://ollama:11434;
        rewrite ^/api/ollama/(.*) /$1 break;
        proxy_pass $ollama;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── SPA routing ────────────────────────────────────────────────────────────

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — immutable cache (hashed filenames from Vite build)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
