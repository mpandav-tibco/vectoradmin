server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolve upstreams dynamically so nginx starts
    # even when optional containers (ollama) are not running
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api/weaviate → weaviate container
    location /api/weaviate/ {
        set $weaviate http://weaviate:8080;
        rewrite ^/api/weaviate/(.*) /$1 break;
        proxy_pass $weaviate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy /api/qdrant → qdrant container (optional)
    location /api/qdrant/ {
        set $qdrant http://qdrant:6333;
        rewrite ^/api/qdrant/(.*) /$1 break;
        proxy_pass $qdrant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy /api/chroma → chroma container (optional)
    location /api/chroma/ {
        set $chroma http://chroma:8000;
        rewrite ^/api/chroma/(.*) /$1 break;
        proxy_pass $chroma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Proxy /api/ollama → ollama container (optional — returns 502 if not running)
    location /api/ollama/ {
        set $ollama http://ollama:11434;
        rewrite ^/api/ollama/(.*) /$1 break;
        proxy_pass $ollama;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # React Router — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
